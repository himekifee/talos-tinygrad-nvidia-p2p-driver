abortConditions:
  - code: donor_patch_no_longer_ports_cleanly
    stopWhen: The aikitoria donor diff no longer applies cleanly on top of the selected NVIDIA open kernel modules 595.58.03 production base.
  - code: stock_toolkit_track_mismatch
    stopWhen: The official nvidia-container-toolkit-production metadata no longer matches the selected 595.58.03 production driver family while targeting Talos v1.13.0-beta.1.
  - code: missing_rollback_image
    stopWhen: No currently deployable rollback installer image is pinned for the target GPU node before build or upgrade work starts.
